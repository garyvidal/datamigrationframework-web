services:
  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-xe
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PASSWORD: Oracle_1234
      # APP_USER creates dmf_user in XEPDB1 with CONNECT + RESOURCE grants.
      # Init scripts in /container-entrypoint-initdb.d run as this user inside XEPDB1.
      APP_USER: dmf_user
      APP_USER_PASSWORD: Dmf_1234
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./init:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

volumes:
  oracle-data:
    driver: local
